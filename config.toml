baseURL = "https://projektemacher.org/"
languageCode = "de"
title = "Projektemacher"
theme = ["hugo-coder", "projektemacher-base"]
publishDir = "docs"
canonifyurls = true
disableKinds = ["term", "taxonomy"]
languagecode = "de"
defaultcontentlanguage = "de"
enableGitInfo = true
enableRobotsTXT = true

[[cascade]]
  [cascade._target]
    kind = '{page,section}'
    path = '/post/**'
  [cascade.params]
    ignoreincludes = true

